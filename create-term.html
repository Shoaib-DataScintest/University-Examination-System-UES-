<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Exam Term</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
    <h2>UES Admin</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a class="active" href="create-term.html">Create Exam Term</a>
    <a href="view-terms.html">View Terms</a>
    <a href="exam-timetable.html">Exam Timetable</a>
    <a href="index.html">Logout</a>
</aside>

<!-- MAIN -->
<main class="main">

<div class="header">
    <h1>Create Exam Term</h1>
    <p>Define a new examination session</p>
</div>

<div class="card">
<form class="form">

    <label>Term Name</label>
    <input type="text" placeholder="Final Term" required>

    <label>Session</label>
    <input type="text" placeholder="Fall 2025" required>

    <label>Semester</label>
    <input type="number" placeholder="5" required>

    <label>Exam Type</label>
    <select required>
        <option value="">Select</option>
        <option>Mid</option>
        <option>Final</option>
        <option>Supplementary</option>
    </select>

    <label>Start Date</label>
    <input type="date" required>

    <label>End Date</label>
    <input type="date" required>

    <label>Status</label>
    <select required>
        <option>Active</option>
        <option>Inactive</option>
    </select>

    <button type="submit">Create Term</button>

</form>
</div>

</main>
</div>
</body>
</html>
