<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Exam Timetable</title>
<link rel="stylesheet" href="css/dashboard.css">

<script>
const role = localStorage.getItem("userRole");
if (!["admin", "hod"].includes(role)) {
    alert("Unauthorized access!");
    window.location.href = "index.html";
}
</script>
</head>

<body>
<div class="layout">

<aside class="sidebar">
    <h2>Exam Timetable</h2>
    <a href="exam-timetable.html">Back</a>
    <a href="index.html">Logout</a>
</aside>

<main class="main">

<div class="header">
    <h1>Delete Timetable</h1>
    <p>Remove an examination schedule</p>
</div>

<div class="card form-card">

<form>
    <div class="form-group">
        <label>Course Code</label>
        <input type="text" placeholder="CS101">
    </div>

    <button class="btn danger"
        onclick="return confirm('Are you sure you want to delete this timetable?')">
        Delete Timetable
    </button>
</form>

</div>
</main>
</div>
</body>
</html>
